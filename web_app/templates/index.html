<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss 直聘 · 自动投递</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ── Taste-Skill v2 Design System ── */
:root{
  --bg:#f4f4ef;--card:#ffffff;--card-hover:#fafaf6;--surface:#eeeee8;--surface2:#e6e6df;
  --border:#d8d8d0;--border-light:#eaeae4;
  --text:#1a1a17;--text-muted:#6b6b63;--text-dim:#9a9a91;--text-inverse:#ffffff;
  --accent:#4a4d7a;--accent-hover:#3b3e68;--accent-light:#e8e8ee;--accent-dim:#9a9bb8;
  --green:#2b7a4e;--red:#b33a3a;--amber:#a67c0e;--slate:#7a7a72;
  --r-sm:6px;--r-md:8px;--r-lg:12px;--r-xl:16px;
  --font-sans:'Geist','Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono','Consolas',monospace;
}

html{height:100%}
body{
  background:var(--bg);color:var(--text);font-family:var(--font-sans);
  height:100%;overflow:hidden;font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}

/* ── Layout ── */
.app{display:flex;height:100dvh}
.left-panel{width:440px;min-width:380px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--card)}
.right-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:44px;border-bottom:1px solid var(--border-light);flex-shrink:0}
.topbar-logo{font-weight:600;font-size:15px;color:var(--text);letter-spacing:-.02em}
.topbar-status{display:flex;align-items:center;gap:6px;margin-left:auto}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--slate);transition:background .3s}
.status-dot.running{background:var(--green)}
.status-text{font-size:13px;color:var(--text-muted)}
.topbar-ts{font-size:12px;color:var(--text-dim);margin-left:8px;letter-spacing:.02em}

/* ── Section headers ── */
.section-label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);font-weight:500;margin-bottom:8px}
.section-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-label-row .section-label{margin-bottom:0}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border-light);overflow-x:auto;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:500;background:transparent;border:1px solid transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;white-space:nowrap}
.tab:hover{background:var(--surface);color:var(--text)}
.tab.active{background:var(--accent-light);border-color:var(--accent-dim);color:var(--accent)}
.tab .badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:50%;font-size:9px;background:var(--surface2);margin-left:5px;padding:0 4px;color:var(--text-muted)}
.tab.active .badge{background:var(--accent);color:var(--text-inverse)}

/* ── Left panel content ── */
.scroll-area{flex:1;overflow-y:auto;padding:12px}

/* ── Form ── */
.form-group{margin-bottom:10px}
.form-label{display:block;font-size:12px;font-weight:400;color:var(--text-muted);margin-bottom:4px}
.form-input,.form-textarea,.form-select{
  width:100%;background:var(--card);border:1px solid var(--border-light);border-radius:var(--r-sm);
  padding:6px 10px;color:var(--text);font-family:var(--font-sans);font-size:13px;
  outline:none;transition:border .2s
}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent-dim)}
.form-textarea{resize:vertical;min-height:52px;line-height:1.6;font-size:12px}
.form-row{display:flex;gap:8px}
.form-row>*{flex:1;min-width:0}

/* ── Toggle ── */
.toggle{position:relative;width:26px;height:14px;flex-shrink:0;cursor:pointer;border-radius:999px;background:var(--border);transition:background .2s}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(12px)}

/* ── Job card ── */
.job-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-md);padding:10px;margin-bottom:6px;transition:border .2s}
.job-card.disabled{opacity:.45}
.job-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.job-card-title{font-size:12px;font-weight:500;color:var(--text)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:9999px;font-family:var(--font-sans);font-size:12px;font-weight:500;
  border:1px solid var(--border-light);background:var(--card);color:var(--text-muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover{background:var(--card-hover);border-color:var(--border);color:var(--text)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:var(--text-inverse)}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-danger{background:transparent;border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(179,58,58,.08)}
.btn-sm{padding:3px 10px;font-size:11px}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;padding:10px 12px;border-top:1px solid var(--border-light);flex-shrink:0}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{display:inline-flex;align-items:center;gap:3px;border-radius:9999px;padding:2px 8px;font-size:11px;background:var(--surface);border:1px solid var(--border-light);color:var(--text-muted)}
.chip-remove{cursor:pointer;opacity:.3;transition:opacity .15s;font-size:12px;line-height:1}
.chip-remove:hover{opacity:1;color:var(--red)}

/* ── Status bar ── */
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border-light);flex-shrink:0;background:var(--card)}
.stats{display:flex;gap:20px}
.stat{text-align:center}
.stat-value{font-size:18px;font-weight:600;letter-spacing:-.02em;line-height:1.2}
.stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em}

/* ── Screenshot area ── */
.preview-box{flex:1;background:var(--surface);margin:8px;border-radius:var(--r-lg);overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:0;position:relative;border:1px solid var(--border-light)}
.preview-box img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.preview-placeholder{color:var(--text-dim);font-size:13px;font-weight:300;text-align:center;padding:1rem}

/* ── Log area ── */
.log-area{height:150px;min-height:100px;overflow-y:auto;font-family:var(--font-mono);font-size:11px;line-height:1.7;padding:8px 12px;background:var(--card);border-top:1px solid var(--border-light);flex-shrink:0}
.log-entry{opacity:0;animation:logFade .15s forwards}
@keyframes logFade{to{opacity:1}}
.log-t{color:var(--text-dim);margin-right:6px}
.log-INFO{color:var(--text-muted)}
.log-SUCCESS{color:var(--green)}
.log-ERROR{color:var(--red)}
.log-WARN{color:var(--amber)}
.log-SYSTEM{color:var(--text-dim);font-style:italic}
.log-LOGIN{color:var(--accent)}

/* ── Misc ── */
.flex{display:flex}
.gap-4{gap:4px}
.gap-8{gap:8px}
.ml-auto{margin-left:auto}
.mt-8{margin-top:8px}
.mb-8{margin-bottom:8px}
.p-8{padding:8px}
.txt-dim{color:var(--text-dim);font-size:12px}

@media(max-width:860px){.app{flex-direction:column}.left-panel{width:100%;min-width:unset;max-height:55dvh;border-right:none;border-bottom:1px solid var(--border-light)}.log-area{height:80px}}
</style>
</head>
<body>
<div class="app">

  <!-- ══ LEFT PANEL ══ -->
  <div class="left-panel">
    <div class="topbar">
      <span class="topbar-logo">&#9679; Boss · 自动投递</span>
      <span class="topbar-ts">taste-skill</span>
      <span class="topbar-status">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText" class="status-text">就绪</span>
      </span>
    </div>

    <!-- Account tabs -->
    <div id="accountTabs" class="tabs"></div>

    <!-- Config form -->
    <div class="scroll-area">
      <!-- Account settings -->
      <div class="flex gap-8 mb-8" style="align-items:center;">
        <span id="acctToggle" class="toggle on" onclick="toggleCurrentAccount()"></span>
        <span style="font-size:12px;color:var(--text-muted);">账号启用</span>
        <input id="acctName" class="form-input" style="flex:1;max-width:160px;" placeholder="昵称" onchange="syncCurrentAccount()">
        <button class="btn btn-sm" onclick="deleteAccount(activeAccountIdx)" style="color:var(--red);border-color:var(--red);font-size:10px;padding:2px 8px;">删除</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">间隔 (秒)</label>
          <div class="flex gap-4">
            <input id="intervalMin" class="form-input" type="number" min="1" style="width:60px;" onchange="syncCurrentAccount()">
            <span style="line-height:32px;color:var(--text-dim);">—</span>
            <input id="intervalMax" class="form-input" type="number" min="1" style="width:60px;" onchange="syncCurrentAccount()">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Cookie</label>
          <input id="cookieFile" class="form-input" onchange="syncCurrentAccount()">
        </div>
      </div>

      <div class="section-label-row">
        <div class="section-label">岗位</div>
        <button class="btn btn-sm" onclick="addJob()" style="font-size:10px;">+</button>
      </div>
      <div id="jobList"></div>

      <div class="section-label-row mt-8">
        <div class="section-label">图片附件</div>
      </div>
      <div id="imageChips" class="chips" style="margin-bottom:6px;"></div>
      <div class="flex gap-4">
        <select id="imageSelector" class="form-select" style="font-size:11px;"><option value="">— 选择 —</option></select>
        <button class="btn btn-sm" onclick="addSelectedImage()">+</button>
      </div>
    </div>

    <!-- Bottom actions -->
    <div class="btn-row">
      <button id="btnStartAll" class="btn btn-primary" onclick="startAll()">&#9654; 启动</button>
      <button id="btnStopAll" class="btn btn-danger" onclick="stopAll()" disabled>&#9632; 停止</button>
      <button id="btnTestLogin" class="btn" onclick="checkLogin()" disabled>检查登录</button>
      <button id="btnConfirmLogin" class="btn" onclick="confirmLogin()" disabled>确认登录</button>
      <button class="btn btn-sm ml-auto" onclick="saveConfig()" style="font-size:10px;">保存</button>
      <button class="btn btn-sm" onclick="addAccount()" style="font-size:10px;">+ 账号</button>
    </div>
  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="right-panel">
    <div class="status-bar">
      <div class="flex gap-8" style="align-items:center;">
        <span id="currentTaskLabel" style="font-size:12px;color:var(--text-muted);"></span>
      </div>
      <div class="stats">
        <div class="stat"><div id="statTotal" class="stat-value" style="color:var(--text-muted);">0</div><div class="stat-label">浏览</div></div>
        <div class="stat"><div id="statApplied" class="stat-value" style="color:var(--green);">0</div><div class="stat-label">投递</div></div>
        <div class="stat"><div id="statSkipped" class="stat-value" style="color:var(--amber);">0</div><div class="stat-label">跳过</div></div>
      </div>
    </div>

    <div class="preview-box">
      <img id="screenshotImg" src="" alt="browser preview" style="display:none;">
      <div id="screenshotPlaceholder" class="preview-placeholder">浏览器预览</div>
    </div>

    <div id="logArea" class="log-area"><div class="log-entry"><span class="log-t">&#9654;</span><span class="log-SYSTEM">就绪</span></div></div>
  </div>

</div>

<script>
const socket = io();
let stats = { total:0, applied:0, skipped:0 };
let config = { accounts:[] };
let activeAccountIdx = 0;
let availableImages = [];

// ═══ 配置 ═══

async function loadConfig() {
  try {
    const res = await fetch('/api/config');
    config = await res.json();
    if (!config.accounts || !config.accounts.length) {
      config = { accounts: [{ name:'主账号', enabled:true, cookie_file:'zhipin_cookies.json', image_files:[], message_interval_min:3, message_interval_max:8, jobs:[{ enabled:true, city:'上海', query:'数据分析', scroll_pages:5, greeting_message:'您好，希望能获得面试机会。' }] }] };
    }
    renderTabs();
    renderAccount(0);
    loadImages();
  } catch(e) { addLog('ERROR', '配置加载失败: ' + e.message); }
}

async function saveConfig() {
  syncCurrentAccount();
  try {
    const res = await fetch('/api/config', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config) });
    const data = await res.json();
    if (data.status === 'ok') { config = data.config; addLog('SYSTEM', '已保存'); }
    else { addLog('ERROR', '保存失败: ' + (data.errors||[]).join(', ')); }
  } catch(e) { addLog('ERROR', '保存异常: ' + e.message); }
}

// ═══ 账号 ═══

function renderTabs() {
  const tabs = document.getElementById('accountTabs');
  tabs.innerHTML = config.accounts.map((a, i) =>
    `<div class="tab${i===activeAccountIdx?' active':''}" onclick="switchAccount(${i})">
      <span class="toggle-dot" style="display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:4px;vertical-align:middle;background:${a.enabled?'var(--green)':'var(--text-dim)'}"></span>${escHtml(a.name||'账号'+(i+1))}
      <span class="badge">${(a.jobs||[]).length}</span>
    </div>`
  ).join('');
}

function switchAccount(i) {
  syncCurrentAccount();
  activeAccountIdx = i;
  renderTabs();
  renderAccount(i);
}

function renderAccount(i) {
  const a = config.accounts[i];
  if (!a) return;
  document.getElementById('acctToggle').className = 'toggle' + (a.enabled ? ' on' : '');
  document.getElementById('acctName').value = a.name || '';
  document.getElementById('intervalMin').value = a.message_interval_min || 3;
  document.getElementById('intervalMax').value = a.message_interval_max || 8;
  document.getElementById('cookieFile').value = a.cookie_file || '';
  renderJobs(i);
  renderImageChips();
}

function syncCurrentAccount() {
  const a = config.accounts[activeAccountIdx];
  if (!a) return;
  a.name = document.getElementById('acctName').value.trim() || ('账号'+(activeAccountIdx+1));
  a.message_interval_min = parseInt(document.getElementById('intervalMin').value) || 3;
  a.message_interval_max = parseInt(document.getElementById('intervalMax').value) || 8;
  a.cookie_file = document.getElementById('cookieFile').value.trim() || 'zhipin_cookies.json';
  document.querySelectorAll('.job-card').forEach(card => {
    const ji = parseInt(card.dataset.jobIndex);
    const job = a.jobs[ji]; if (!job) return;
    const q = card.querySelector('.j-q'), c = card.querySelector('.j-c'), p = card.querySelector('.j-p'), g = card.querySelector('.j-g');
    if (q) job.query = q.value;
    if (c) job.city = c.value;
    if (p) job.scroll_pages = parseInt(p.value) || 5;
    if (g) job.greeting_message = g.value;
  });
}

function toggleCurrentAccount() {
  const a = config.accounts[activeAccountIdx]; if (!a) return;
  a.enabled = !a.enabled;
  document.getElementById('acctToggle').className = 'toggle' + (a.enabled ? ' on' : '');
  renderTabs();
}

async function addAccount() {
  syncCurrentAccount();
  try {
    const res = await fetch('/api/config/accounts', { method:'POST' });
    const data = await res.json();
    if (data.status === 'ok') { config.accounts = data.accounts; activeAccountIdx = config.accounts.length-1; renderTabs(); renderAccount(activeAccountIdx); addLog('INFO', '已添加账号'); }
    else addLog('ERROR', '添加账号失败');
  } catch(e) { addLog('ERROR', e.message); }
}

async function deleteAccount(i) {
  if (!confirm('确定删除「' + (config.accounts[i]?.name||'') + '」?')) return;
  syncCurrentAccount();
  try {
    const res = await fetch('/api/config/accounts/' + i, { method:'DELETE' });
    const data = await res.json();
    if (data.status === 'ok') { config.accounts = data.accounts; if (activeAccountIdx >= config.accounts.length) activeAccountIdx = Math.max(0, config.accounts.length-1); renderTabs(); renderAccount(activeAccountIdx); addLog('INFO', '已删除'); }
    else addLog('ERROR', '删除失败');
  } catch(e) { addLog('ERROR', e.message); }
}

// ═══ 岗位 ═══

function renderJobs(ai) {
  const a = config.accounts[ai];
  const container = document.getElementById('jobList');
  if (!a || !a.jobs || !a.jobs.length) {
    container.innerHTML = '<div class="txt-dim" style="padding:8px 0;">暂无岗位</div>'; return;
  }
  container.innerHTML = a.jobs.map((job, ji) => `
    <div class="job-card${job.enabled?'':' disabled'}" data-job-index="${ji}">
      <div class="job-card-header">
        <div class="flex gap-4" style="align-items:center;">
          <span class="toggle${job.enabled?' on':''}" onclick="event.stopPropagation();toggleJob(${ji})"></span>
          <span class="job-card-title">岗位 ${ji+1}</span>
        </div>
        <div class="flex gap-4">
          <button class="btn btn-sm" onclick="deleteJob(${ji})" style="color:var(--red);border-color:transparent;font-size:10px;padding:1px 6px;">&#10005;</button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">关键词</label><input class="form-input j-q" value="${escAttr(job.query||'')}" onchange="syncCurrentAccount()" placeholder="数据分析"></div>
        <div class="form-group"><label class="form-label">城市</label>
          <select class="form-select j-c" onchange="syncCurrentAccount()">${['上海','北京','深圳','广州','杭州','成都','武汉','南京','西安','苏州'].map(c=>'<option'+(c===job.city?' selected':'')+'>'+c+'</option>').join('')}</select>
        </div>
        <div class="form-group"><label class="form-label">页数</label><input class="form-input j-p" type="number" min="1" value="${job.scroll_pages||5}" onchange="syncCurrentAccount()" style="width:52px;"></div>
      </div>
      <div class="form-group"><label class="form-label">招呼语</label><textarea class="form-textarea j-g" rows="2" onchange="syncCurrentAccount()">${escHtml(job.greeting_message||'')}</textarea></div>
    </div>
  `).join('');
}

function toggleJob(ji) {
  const a = config.accounts[activeAccountIdx];
  if (!a || !a.jobs[ji]) return;
  a.jobs[ji].enabled = !a.jobs[ji].enabled;
  renderJobs(activeAccountIdx); renderTabs();
}

async function addJob() {
  syncCurrentAccount();
  try {
    const res = await fetch('/api/config/accounts/' + activeAccountIdx + '/jobs', { method:'POST' });
    const data = await res.json();
    if (data.status === 'ok') { config.accounts = data.accounts; renderJobs(activeAccountIdx); renderTabs(); addLog('INFO', '已添加岗位'); }
    else addLog('ERROR', '添加岗位失败');
  } catch(e) { addLog('ERROR', e.message); }
}

async function deleteJob(ji) {
  if (!confirm('确定删除此岗位?')) return;
  syncCurrentAccount();
  try {
    const res = await fetch('/api/config/accounts/' + activeAccountIdx + '/jobs/' + ji, { method:'DELETE' });
    const data = await res.json();
    if (data.status === 'ok') { config.accounts = data.accounts; renderJobs(activeAccountIdx); renderTabs(); addLog('INFO', '已删除岗位'); }
    else addLog('ERROR', '删除失败');
  } catch(e) { addLog('ERROR', e.message); }
}

// ═══ 图片 ═══

async function loadImages() {
  try {
    const res = await fetch('/api/images');
    availableImages = await res.json();
    const sel = document.getElementById('imageSelector');
    sel.innerHTML = '<option value="">— 选择 —</option>' + availableImages.map(f=>'<option value="'+escAttr(f)+'">'+escHtml(f)+'</option>').join('');
  } catch(e) {}
}

function renderImageChips() {
  const a = config.accounts[activeAccountIdx]; if (!a) return;
  const c = document.getElementById('imageChips');
  const files = a.image_files || [];
  c.innerHTML = files.length ? files.map(f=>'<span class="chip">'+escHtml(f)+'<span class="chip-remove" onclick=\'removeImage('+JSON.stringify(f)+')\'>&#10005;</span></span>').join('') : '<span class="txt-dim">无</span>';
}

function removeImage(name) {
  const a = config.accounts[activeAccountIdx]; if (!a) return;
  a.image_files = (a.image_files||[]).filter(f=>f!==name); renderImageChips();
}

function addSelectedImage() {
  const sel = document.getElementById('imageSelector'); const name = sel.value; if (!name) return;
  const a = config.accounts[activeAccountIdx]; if (!a) return;
  if (!a.image_files) a.image_files = [];
  if (!a.image_files.includes(name)) { a.image_files.push(name); renderImageChips(); }
  sel.value = '';
}

// ═══ 操作 ═══

function startAll() { saveConfig().then(() => { socket.emit('start_all'); addLog('SYSTEM', '启动所有任务...'); }); }
function stopAll() { socket.emit('stop_all'); addLog('SYSTEM', '停止中...'); }
function confirmLogin() { socket.emit('confirm_login'); }
function checkLogin() { socket.emit('check_login'); }

function setControls(running) {
  document.getElementById('btnStartAll').disabled = running;
  document.getElementById('btnStopAll').disabled = !running;
  document.getElementById('btnConfirmLogin').disabled = !running;
  document.getElementById('btnTestLogin').disabled = !running;
  const dot = document.getElementById('statusDot');
  document.getElementById('statusText').textContent = running ? '运行中' : '就绪';
  dot.className = 'status-dot' + (running ? ' running' : '');
}

function updateStats() {
  document.getElementById('statTotal').textContent = stats.total;
  document.getElementById('statApplied').textContent = stats.applied;
  document.getElementById('statSkipped').textContent = stats.skipped;
}

// ═══ 工具 ═══

function escHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function escAttr(t) { return (t||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function addLog(level, message) {
  const area = document.getElementById('logArea');
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = '<span class="log-t">'+new Date().toLocaleTimeString()+'</span><span class="log-'+level+'">'+escHtml(message)+'</span>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  while (area.children.length > 300) area.removeChild(area.firstChild);
}

// ═══ SocketIO ═══

socket.on('connect', () => addLog('SYSTEM', '已连接'));
socket.on('disconnect', () => addLog('ERROR', '断开'));
socket.on('bot_log', (d) => addLog('INFO', d.message));
socket.on('bot_progress', (d) => {
  if (d.total !== undefined) stats.total = d.total;
  if (d.applied !== undefined) stats.applied = d.applied;
  if (d.skipped !== undefined) stats.skipped = d.skipped;
  updateStats();
});
socket.on('bot_screenshot', (d) => {
  const img = document.getElementById('screenshotImg'), plc = document.getElementById('screenshotPlaceholder');
  img.src = 'data:image/png;base64,' + d.image; img.style.display = 'block'; plc.style.display = 'none';
  document.getElementById('currentTaskLabel').textContent = d.label || '';
});
socket.on('bot_status', (d) => {
  setControls(d.running);
  if (!d.running) document.getElementById('currentTaskLabel').textContent = '';
});
socket.on('scheduler_status', (d) => {
  setControls(d.running);
  if (d.current) document.getElementById('currentTaskLabel').textContent = d.current.account + ' / ' + d.current.query + '(' + d.current.city + ')';
  else if (!d.running) document.getElementById('currentTaskLabel').textContent = '';
});
socket.on('login_result', (d) => { if (d.success) addLog('SUCCESS', '已登录'); else addLog('ERROR', '未登录'); });

loadConfig();
</script>
